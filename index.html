<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOF & FRAME Pro v12.4</title>
    <style>
        :root {
            --bg-color: #050a0f;
            --card-bg: #111a22;
            --accent: #00aaff;
            --lock-accent: #ff9800;
            --text: #f0f0f0;
            --text-dim: #888;
            --green-grad: linear-gradient(90deg, rgba(76,175,80,0) 0%, rgba(76,175,80,0.8) 20%, rgba(76,175,80,0.8) 80%, rgba(76,175,80,0) 100%);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 10px; width: 100%; }
        .tab { flex: 1; padding: 12px; background: #1a2633; border: none; color: var(--text-dim); cursor: pointer; border-radius: 8px 8px 0 0; font-weight: bold; }
        .tab.active { background: var(--card-bg); color: var(--accent); border-bottom: 2px solid var(--accent); }

        .monitor-card { background: #000; border: 2px solid #1a334d; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        
        #dofView { display: block; }
        .viz-container { height: 90px; background: repeating-linear-gradient(90deg, #05101a 0px, #05101a 49px, #1a334d 50px); position: relative; border-radius: 4px; margin: 15px 0; }
        .dof-bar { height: 36px; background: var(--green-grad); position: absolute; top: 27px; transition: 0.3s; }
        .subject-marker { width: 2px; height: 60px; background: #fff; position: absolute; top: 15px; z-index: 10; box-shadow: 0 0 10px var(--accent); }

        #frameView { display: none; }
        .frame-container { width: 100%; aspect-ratio: 3 / 2; background: #1a1a1a; position: relative; display: flex; justify-content: center; align-items: center; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
        .sensor-outline { width: 95%; height: 95%; border: 1.5px solid rgba(255,255,255,0.8); box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); z-index: 5; pointer-events: none; position: absolute; }
        .subject-ellipse { position: absolute; z-index: 2; border-radius: 50%; transition: 0.4s; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .res-item { background: #0a141d; padding: 8px; border-radius: 4px; border-left: 3px solid var(--accent); }
        .res-lab { font-size: 0.6rem; color: var(--text-dim); }
        .res-val { font-size: 0.85rem; font-weight: bold; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #1a334d; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .input-box { background: #000; border: 1px solid #1a334d; color: var(--accent); font-size: 1.1rem; font-weight: bold; text-align: right; padding: 5px; border-radius: 4px; width: 95px; }
        .input-box.locked-style { color: var(--lock-accent); }
        
        .lock-btn { background: #222; border: 1px solid #444; color: #666; border-radius: 4px; font-size: 0.6rem; padding: 4px 8px; cursor: pointer; font-weight: bold; }
        .lock-btn.active { background: #332200; border-color: var(--lock-accent); color: var(--lock-accent); }

        .switch-box { display: flex; align-items: center; gap: 10px; background: #0a141d; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8rem; }
        input[type="range"] { width: 100%; -webkit-appearance: none; background: #1a334d; height: 6px; border-radius: 3px; margin: 10px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button id="tabDof" class="tab active" onclick="switchTab('dof')">DOF MONITOR</button>
        <button id="tabFrame" class="tab" onclick="switchTab('frame')">FRAME SIM</button>
    </div>

    <div class="monitor-card">
        <div id="dofView">
            <div class="viz-container">
                <div id="dofBar" class="dof-bar"></div>
                <div id="subjectMarker" class="subject-marker"></div>
            </div>
            <div class="res-grid">
                <div class="res-item"><div class="res-lab">NEAR LIMIT</div><div id="nearVal" class="res-val">-</div></div>
                <div class="res-item"><div class="res-lab">FAR LIMIT</div><div id="farVal" class="res-val">-</div></div>
                <div class="res-item"><div class="res-lab">HYPERFOCAL</div><div id="hyperVal" class="res-val">-</div></div>
                <div id="panStatus" class="res-item" style="border-color:var(--lock-accent);"><div class="res-lab">STATUS</div><div class="res-val" id="statusLabel">READY</div></div>
            </div>
        </div>

        <div id="frameView">
            <div class="frame-container">
                <div class="sensor-outline"></div>
                <div id="subEllipse" class="subject-ellipse"></div>
            </div>
            <div class="res-grid">
                <div class="res-item"><div class="res-lab">FRAME WIDTH</div><div id="fwVal" class="res-val">-</div></div>
                <div class="res-item"><div class="res-lab">MAGNIFICATION</div><div id="magVal" class="res-val">-</div></div>
            </div>
        </div>
    </div>

    <div class="switch-box">
        <input type="checkbox" id="waterMode" onchange="update('mode')"> 🌊 UNDERWATER MODE (x1.33)
    </div>

    <div class="card">
        <div class="input-row">
            <label style="font-size:0.8rem">Subject Size (m)</label>
            <input type="number" id="subSize" class="input-box" value="10.0" step="0.1" oninput="update('subBox')">
        </div>
    </div>

    <div class="card">
        <div class="input-row">
            <div style="display:flex; gap:5px; align-items:center;">
                <button id="lockDist" class="lock-btn" onclick="toggleLock('Dist')">LOCK</button>
                <label style="font-size:0.8rem">Distance (m)</label>
            </div>
            <input type="number" id="distBox" class="input-box" value="5.0" step="0.1" oninput="update('distBox')">
        </div>
        <input type="range" id="distRange" min="0.1" max="1000" step="1" value="5" oninput="update('distRange')">
        <div style="display:flex; justify-content:space-between; font-size:0.55rem; color:var(--text-dim); padding:0 2px;">
            <span>0.1m</span><span>250m</span><span>500m</span><span>750m</span><span>1000m</span>
        </div>
    </div>

    <div class="card" id="apertureControl">
        <div class="input-row">
            <div style="display:flex; gap:5px; align-items:center;">
                <button id="lockF" class="lock-btn" onclick="toggleLock('F')">LOCK</button>
                <label style="font-size:0.8rem">Aperture (f)</label>
            </div>
            <input type="number" id="fBox" class="input-box" value="8.0" readonly>
        </div>
        <input type="range" id="fRange" min="0" max="16" step="1" value="7" oninput="update('fRange')">
    </div>

    <div class="card">
        <div class="input-row">
            <div style="display:flex; gap:5px; align-items:center;">
                <button id="lockFL" class="lock-btn" onclick="toggleLock('FL')">LOCK</button>
                <label style="font-size:0.8rem">Focal Length (mm)</label>
            </div>
            <input type="number" id="flBox" class="input-box" value="24" step="1" oninput="update('flBox')">
        </div>
        <input type="range" id="flRange" min="14" max="1600" step="1" value="24" oninput="update('flRange')">
        <div style="display:flex; justify-content:space-between; font-size:0.55rem; color:var(--text-dim); padding:0 2px;">
            <span>14mm</span><span>800mm</span><span>1600mm</span>
        </div>
    </div>
</div>

<script>
    const fStops = [1.4, 2.0, 2.8, 4.0, 5.6, 6.3, 7.1, 8.0, 9.0, 10, 11, 13, 14, 16, 18, 20, 22];
    let locks = { F: false, FL: false, Dist: false };

    function switchTab(type) {
        document.getElementById('dofView').style.display = type === 'dof' ? 'block' : 'none';
        document.getElementById('frameView').style.display = type === 'frame' ? 'block' : 'none';
        document.getElementById('apertureControl').style.display = type === 'dof' ? 'block' : 'none';
        
        document.getElementById('tabDof').classList.toggle('active', type === 'dof');
        document.getElementById('tabFrame').classList.toggle('active', type === 'frame');
        update('tab');
    }

    function toggleLock(key) {
        locks[key] = !locks[key];
        const btn = document.getElementById('lock' + key);
        const box = document.getElementById(key.toLowerCase() + 'Box');
        btn.classList.toggle('active', locks[key]);
        box.classList.toggle('locked-style', locks[key]);
        if (key === 'F') box.readOnly = true; 
    }

    function update(src) {
        const isWater = document.getElementById('waterMode').checked;
        const subSize = parseFloat(document.getElementById('subSize').value) || 0.1;
        
        let FL = parseFloat(document.getElementById('flBox').value) || 24;
        let L = parseFloat(document.getElementById('distBox').value) || 0.1;
        let F_idx = document.getElementById('fRange').value;
        let F = fStops[F_idx];

        if(src === 'distRange') { L = document.getElementById('distRange').value; document.getElementById('distBox').value = L; }
        if(src === 'distBox') { 
            L = parseFloat(document.getElementById('distBox').value) || 0.1; 
            document.getElementById('distRange').value = Math.min(1000, L); 
        }
        if(src === 'flRange') { FL = document.getElementById('flRange').value; document.getElementById('flBox').value = FL; }
        if(src === 'flBox') { 
            FL = parseFloat(document.getElementById('flBox').value) || 14; 
            document.getElementById('flRange').value = Math.min(1600, FL); 
        }
        if(src === 'fRange') { F = fStops[F_idx]; document.getElementById('fBox').value = F.toFixed(1); }

        const f_calc = isWater ? FL * 1.33 : FL;
        const coc = 0.030;
        const distMM = L * 1000;

        if (locks.Dist && !locks.F && (src === 'flRange' || src === 'flBox')) {
            if (distMM > f_calc) {
                let idealF = Math.pow(f_calc, 2) / ((distMM - f_calc) * coc);
                let bestIdx = fStops.findIndex(val => val >= idealF);
                if (bestIdx === -1) bestIdx = fStops.length - 1;
                document.getElementById('fRange').value = bestIdx;
                F = fStops[bestIdx];
                document.getElementById('fBox').value = F.toFixed(1);
            }
        }
        else if (locks.F && !locks.Dist && (src === 'flRange' || src === 'flBox')) {
            let idealDist = (Math.pow(f_calc, 2) / (F * coc)) + f_calc;
            L = (idealDist / 1000).toFixed(2);
            document.getElementById('distBox').value = L;
            document.getElementById('distRange').value = Math.min(1000, L);
        }

        const H = (Math.pow(f_calc, 2) / (F * coc)) + f_calc;
        const near = (distMM * (H - f_calc)) / (H + distMM - 2*f_calc);
        const far = (distMM * (H - f_calc)) / (H - distMM);
        const isPan = (distMM >= H || far < 0);

        document.getElementById('nearVal').innerText = (near/1000).toFixed(2) + "m";
        document.getElementById('farVal').innerText = isPan ? "∞" : (far/1000).toFixed(2) + "m";
        document.getElementById('hyperVal').innerText = (H/1000).toFixed(2) + "m";
        
        const label = document.getElementById('statusLabel');
        label.innerText = isPan ? "PAN-FOCUS ACTIVE" : "LIMITED DOF";
        label.style.color = isPan ? "var(--lock-accent)" : "var(--accent)";

        // モニターバーのスケール調整（Lの値に合わせて動的に変化）
        let maxViz = Math.max(20, L * 1.5);
        const vizScale = 100 / maxViz;
        document.getElementById('subjectMarker').style.left = Math.min(100, L * vizScale) + "%";
        const nP = (near/1000 * vizScale), fP = isPan ? 100 : (far/1000 * vizScale);
        document.getElementById('dofBar').style.left = Math.min(100, nP) + "%";
        document.getElementById('dofBar').style.width = Math.max(0, Math.min(100-nP, fP-nP)) + "%";

        const beta = f_calc / (distMM - f_calc);
        const visibleWidth = 36 / beta; 
        document.getElementById('fwVal').innerText = (visibleWidth/1000).toFixed(2) + "m";
        document.getElementById('magVal').innerText = "1:" + (1/beta).toFixed(1);
        
        const ellipse = document.getElementById('subEllipse');
        const displayWidth = Math.min(95, (subSize * 1000) / visibleWidth * 95);
        ellipse.style.width = displayWidth + "%";
        ellipse.style.aspectRatio = "1.5 / 1";
        
        let color = '#00aaff';
        if (subSize <= 0.1) color = '#ff00ff';
        else if (subSize <= 1.0) color = '#4caf50';
        else if (subSize <= 2.0) color = '#ff9800';
        else if (subSize > 10.0) color = '#1a237e';
        ellipse.style.backgroundColor = color + "66";
        ellipse.style.border = `2px solid ${color}`;
    }
    update('init');
</script>
</body>
</html>
