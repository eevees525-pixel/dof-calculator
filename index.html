<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOF & FRAME & EXP Pro v13.1</title>
    <style>
        :root {
            --bg-color: #050a0f;
            --card-bg: #111a22;
            --accent: #00aaff;
            --lock-accent: #ff9800;
            --text: #f0f0f0;
            --text-dim: #888;
            --green-grad: linear-gradient(90deg, rgba(76,175,80,0) 0%, rgba(76,175,80,0.8) 20%, rgba(76,175,80,0.8) 80%, rgba(76,175,80,0) 100%);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 10px; width: 100%; }
        .tab { flex: 1; padding: 12px; background: #1a2633; border: none; color: var(--text-dim); cursor: pointer; border-radius: 8px 8px 0 0; font-weight: bold; font-size: 0.75rem; text-align: center; }
        .tab.active { background: var(--card-bg); color: var(--accent); border-bottom: 2px solid var(--accent); }

        .monitor-card { background: #000; border: 2px solid #1a334d; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        
        #dofView { display: block; }
        .viz-container { height: 90px; background: repeating-linear-gradient(90deg, #05101a 0px, #05101a 49px, #1a334d 50px); position: relative; border-radius: 4px; margin: 15px 0; }
        .dof-bar { height: 36px; background: var(--green-grad); position: absolute; top: 27px; transition: 0.3s; }
        .subject-marker { width: 2px; height: 60px; background: #fff; position: absolute; top: 15px; z-index: 10; box-shadow: 0 0 10px var(--accent); }

        #frameView { display: none; }
        .frame-container { width: 100%; aspect-ratio: 3 / 2; background: #1a1a1a; position: relative; overflow: hidden; border: 1px solid #333; border-radius: 4px; }
        .sensor-outline { width: 95%; height: 95%; border: 1.5px solid rgba(255,255,255,0.8); box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); z-index: 5; pointer-events: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .subject-ellipse { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; border-radius: 50%; transition: width 0.15s ease-out, background-color 0.3s; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        #expView { display: none; }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .res-item { background: #0a141d; padding: 8px; border-radius: 4px; border-left: 3px solid var(--accent); }
        .res-lab { font-size: 0.6rem; color: var(--text-dim); }
        .res-val { font-size: 0.85rem; font-weight: bold; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #1a334d; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
